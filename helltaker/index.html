<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Helltaker</title>

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #02021c;
      }

      #unity-container {
        position: fixed;
        inset: 0;
      }

      #unity-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        background: #02021c;
      }
    </style>
  </head>

  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script>
      const BASE =
        "https://cdn.jsdelivr.net/gh/reeyuki/yukios-games@main/helltaker/Build/";

      const STREAM_BASE =
        "https://cdn.jsdelivr.net/gh/reeyuki/yukios-games@main/helltaker/StreamingAssets/";

      async function mergeParts(files) {
        const buffers = await Promise.all(
          files.map((f) =>
            fetch(BASE + f).then((r) => r.arrayBuffer()),
          ),
        );

        const total = buffers.reduce((a, b) => a + b.byteLength, 0);

        const merged = new Uint8Array(total);

        let offset = 0;
        for (const b of buffers) {
          merged.set(new Uint8Array(b), offset);
          offset += b.byteLength;
        }

        return URL.createObjectURL(
          new Blob([merged], { type: "application/octet-stream" }),
        );
      }

      async function start() {
        const canvas = document.querySelector("#unity-canvas");

        const dataUrl = await mergeParts(["web.data.1", "web.data.2"]);
        const wasmUrl = await mergeParts(["web.wasm.1", "web.wasm.2"]);

        const loader = document.createElement("script");
        loader.src = BASE + "web.loader.js";

        loader.onload = () => {
          createUnityInstance(canvas, {
            dataUrl: dataUrl,
            frameworkUrl: BASE + "web.framework.js",
            codeUrl: wasmUrl,
            streamingAssetsUrl: STREAM_BASE,
            companyName: "vanripper",
            productName: "Helltaker",
            productVersion: "ex1.1",
          });
        };

        document.body.appendChild(loader);
      }

      start();
    </script>
  </body>
</html>
